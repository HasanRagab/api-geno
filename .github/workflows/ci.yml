name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable

      - name: Install dependencies
        run: |
          bun install

      - name: Build TypeScript
        run: |
          bun run build

      - name: Regenerate generated files
        run: |
          bun dist/cli.js generate -i api.json -o ./generated

      - name: Run tests
        run: |
          bun test
