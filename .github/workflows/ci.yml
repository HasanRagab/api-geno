name: CI & Auto Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            .bun
          key: ${{ runner.os }}-bun-latest-${{ hashFiles('**/bun.lock') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build TypeScript
        run: bun run build

      - name: Regenerate generated files
        run: bun dist/cli.js generate -i api.json -o ./generated

      - name: Run tests
        run: bun test

      - name: Compile standalone CLI
        run: |
          mkdir -p release
          bun run release
          chmod +x release/api-geno

      # -------------------------------
      # Auto-version bump
      # -------------------------------
      - name: Auto Bump Version
        id: version
        run: |
          # get current version
          VERSION_FILE=VERSION
          VERSION=$(cat $VERSION_FILE)
          
          # simple semver bump: patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH+1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo $NEW_VERSION > $VERSION_FILE
          echo "New version: $NEW_VERSION"

          # commit version bump
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add $VERSION_FILE
          git commit -m "Bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------
      # Upload build to GitHub Release
      # -------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.version.outputs.new_version }}"
          name: "Release v${{ steps.version.outputs.new_version }}"
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
