name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [created]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            .bun
          key: ${{ runner.os }}-bun-latest-${{ hashFiles('**/bun.lock') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build TypeScript
        run: bun run build

      - name: Regenerate generated files
        run: bun dist/cli.js generate -i api.json -o ./generated

      - name: Run tests
        run: bun test

      - name: Compile standalone CLI
        run: |
          mkdir -p release
          bun run release
          chmod +x release/api-geno

      - name: Upload GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/api-geno
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}